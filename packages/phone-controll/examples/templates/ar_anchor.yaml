apiVersion: phone-controll/v1
kind: TestPlan
metadata:
  name: ar-anchor-placement
spec:
  device:
    platform: android
    pool: any
  project:
    path: .
  phases:
    - phase: PRE_FLIGHT
    - phase: CLEAN
      package_id: REPLACE_WITH_PACKAGE_ID
    - phase: LAUNCHED
      package_id: REPLACE_WITH_PACKAGE_ID
      wait_for_key: arEntryButton
      timeout_s: 20
    - phase: PERM_CAMERA_GATE
      driver:
        kind: patrol_test
        target: integration_test/ar_camera_perm_test.dart
      planned_outcome: accept
    - phase: UNDER_TEST
      driver:
        kind: patrol_test
        target: integration_test/ar_anchor_test.dart
      capture: [screenshot, logs]
  report:
    format: junit
