[project]
name = "mcp-phone-controll"
version = "0.1.0"
description = "MCP server for building, deploying and testing Flutter apps on real Android devices"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Michal Giza", email = "msquaregiza@gmail.com" }]
dependencies = [
    "mcp>=1.2.0",
    "uiautomator2>=3.2.0",
    "facebook-wda>=1.4.6",
    "pymobiledevice3>=4.0.0",
    "anyio>=4.4.0",
    "pydantic>=2.7.0",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
    "fastapi>=0.110",
    "httpx>=0.27",
]
ar = [
    "opencv-python>=4.9",
    "numpy>=1.26",
]
http = [
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "httpx>=0.27",
]

[project.scripts]
mcp-phone-controll = "mcp_phone_controll.__main__:main"
mcp-phone-controll-http = "mcp_phone_controll.adapters.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_phone_controll"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers"
python_classes = "Test"
filterwarnings = ["ignore::pytest.PytestCollectionWarning"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]

[tool.mypy]
python_version = "3.11"
strict = true
packages = ["mcp_phone_controll"]
