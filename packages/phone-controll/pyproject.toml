[project]
name = "mcp-phone-controll"
version = "0.1.0"
description = "MCP server for building, deploying and testing Flutter apps on real Android devices"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Michal Giza", email = "msquaregiza@gmail.com" }]
dependencies = [
    "mcp>=1.2.0",
    "uiautomator2>=3.2.0",
    "facebook-wda>=1.4.6",
    "pymobiledevice3>=4.0.0",
    "anyio>=4.4.0",
    "pydantic>=2.7.0",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
    "fastapi>=0.110",
    "httpx>=0.27",
]
ar = [
    "opencv-python>=4.9",
    "numpy>=1.26",
]
http = [
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "httpx>=0.27",
]
debug = [
    "websockets>=13.0",
]
rag = [
    # Vector store (single binary; runs as `docker run -p 6333:6333 qdrant/qdrant`)
    "qdrant-client>=1.9",
    # ONNX-served embeddings — no torch required.
    "fastembed>=0.3",
]

[project.scripts]
mcp-phone-controll = "mcp_phone_controll.__main__:main"
mcp-phone-controll-http = "mcp_phone_controll.adapters.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_phone_controll"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers"
python_classes = "Test"
filterwarnings = ["ignore::pytest.PytestCollectionWarning"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]
# Deliberate-style ignores — these flag patterns we use on purpose, not bugs.
ignore = [
    # We use `class Foo(str, Enum)` deliberately for JSON-serialisation
    # compatibility across providers that don't read StrEnum reliably.
    "UP042",
    # Em-dashes, en-dashes and similar Unicode punctuation in docstrings
    # are intentional prose style; ruff flags them as "ambiguous" but
    # they're readable and consistent across the codebase.
    "RUF001",  # ambiguous-unicode-character-string
    "RUF002",  # ambiguous-unicode-character-docstring
    # Pure-style preferences we don't enforce:
    "SIM108",  # if/else → ternary; sometimes the explicit form is clearer
    "SIM103",  # `return bool(x)` is sometimes more readable than `return x`
    "RUF005",  # `[*lst, x]` vs `lst + [x]` is a taste preference
    "RUF007",  # `zip(a, a[1:])` is fine; `itertools.pairwise` is sometimes overkill
    "RUF046",  # int(round(x)) — explicit cast can be clearer than relying on Python 3.x semantics
]

[tool.ruff.lint.per-file-ignores]
# Tests legitimately do deferred imports for skip-conditions and lazy paths.
"tests/**/*.py" = ["E402"]
# Container wires deferred imports inside build_runtime() for optional extras.
"src/mcp_phone_controll/container.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
strict = true
packages = ["mcp_phone_controll"]
